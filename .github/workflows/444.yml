name: 物理强删-从源头彻底抹除不相关补丁

on:
  workflow_dispatch: # 手动点击触发，执行“物理手术”

jobs:
  permanent_delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 物理授权：允许工作流回写仓库

    steps:
      - name: 1. 检出仓库 (带回写权限)
        uses: actions/checkout@v4
        with:
          ref: openwrt-24.10-6.6
          fetch-depth: 0

      - name: 2. 物理执行“外科手术”级删除
        run: |
          TARGET_DIR="target/linux/mediatek/patches-6.6"
          echo "🔍 正在进入物理目录: $TARGET_DIR"
          
          if [ -d "$TARGET_DIR" ]; then
            cd $TARGET_DIR
            
            echo "🧹 正在从源头物理抹除 17xx 系列 (v6.8/v6.9 Backport)..."
            rm -fv 999-17*.patch
            
            echo "🧹 正在物理抹除 27xx 系列 (包含报错的 2714 EEE 冲突补丁)..."
            rm -fv 999-27*.patch
            
            echo "🧹 正在物理抹除 15xx 系列 (非核心实验性补丁)..."
            rm -fv 999-15*.patch
            
            echo "🛠️ 正在执行 API 物理对齐 (ethtool_keee)..."
            # 针对 6.6 内核，确保剩下的 MTK 核心驱动补丁能跑通
            find . -type f -name "*.patch" -exec sed -i 's/struct ethtool_eee/struct ethtool_keee/g' {} +
            find . -type f -name "*.patch" -exec sed -i 's/\.supported/\.supported_u32/g' {} +

            echo "📋 物理审计：当前剩余 999 系列补丁清单:"
            ls -1 999-* || echo "无 999 系列补丁残留"
          else
            echo "❌ 错误：找不到物理路径 $TARGET_DIR"
            exit 1
          fi

      - name: 3. 物理提交更改回 GitHub
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # 记录物理删除动作和 API 修改
          git add target/linux/mediatek/patches-6.6/*.patch
          
          # 检查是否有文件被删除，并记录
          git add -u target/linux/mediatek/patches-6.6/
          
          if git commit -m "物理清淤：从源头彻底抹除 17xx/27xx/15xx 冲突补丁并对齐 API"; then
            echo "🚀 正在将删除操作物理推送到仓库源..."
            git push origin openwrt-24.10-6.6
          else
            echo "✨ 仓库已经是净化的，无需操作。"
          fi
