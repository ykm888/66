name: 物理强删-源头彻底抹除不相关补丁

on:
  workflow_dispatch: # 手动点击触发

jobs:
  permanent_delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须：授权回写权限

    steps:
      - name: 1. 检出仓库 (带回写权限)
        uses: actions/checkout@v4
        with:
          ref: openwrt-24.10-6.6
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }} # 显式使用令牌确保权限

      - name: 2. 物理执行“外科手术”级删除
        run: |
          TARGET_DIR="target/linux/mediatek/patches-6.6"
          echo "🔍 正在进入物理目录: $TARGET_DIR"
          
          if [ -d "$TARGET_DIR" ]; then
            cd $TARGET_DIR
            
            # 物理删除所有冲突序号段补丁
            echo "🧹 正在从源头物理抹除 1xxx/2xxx/3xxx/MT7988 系列..."
            rm -fv 999-1*.patch
            rm -fv 999-2*.patch
            rm -fv 999-3*.patch
            rm -fv *7988*.patch
            rm -fv *mt753x*.patch
            
            echo "🛠️ 正在执行 API 物理对齐 (ethtool_keee)..."
            # 即使删除了一部分，剩下的补丁也必须修改源码内容
            find . -type f -name "*.patch" -exec sed -i 's/struct ethtool_eee/struct ethtool_keee/g' {} +
            find . -type f -name "*.patch" -exec sed -i 's/\.supported/\.supported_u32/g' {} +

            echo "📋 物理审计：当前剩余 999 系列补丁清单:"
            ls -1
          else
            echo "❌ 错误：找不到物理路径 $TARGET_DIR"
            exit 1
          fi

      - name: 3. 物理回写 (强制推送)
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # 强制同步所有删除和修改动作
          git add -A target/linux/mediatek/patches-6.6/
          
          # 检查是否有改动并物理推送
          if git commit -m "物理清淤：从源头彻底抹除 1xxx/2xxx/3xxx 冗余补丁并对齐 API"; then
            echo "🚀 正在将删除操作强制推送到远程分支 openwrt-24.10-6.6..."
            git push origin HEAD:openwrt-24.10-6.6 --force
          else
            echo "✨ 仓库已经是净化的，无需物理操作。"
          fi
