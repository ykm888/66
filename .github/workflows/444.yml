name: 物理强删-从源头彻底抹除不相关补丁

on:
  workflow_dispatch: # 手动点击触发

jobs:
  permanent_delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 物理授权

    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4
        with:
          ref: openwrt-24.10-6.6
          fetch-depth: 0

      - name: 2. 物理执行“外科手术”级删除
        run: |
          TARGET_DIR="target/linux/mediatek/patches-6.6"
          echo "🔍 正在进入物理目录: $TARGET_DIR"
          cd $TARGET_DIR
          
          # 物理删除截图中的所有 17xx, 27xx 冲突源
          echo "🧹 抹除截图中的 1xxx, 2xxx, 3xxx 系列垃圾补丁..."
          rm -fv 999-1*.patch
          rm -fv 999-2*.patch
          rm -fv 999-3*.patch
          
          # 物理对齐 API，确保 998 等剩余补丁兼容 6.6 内核
          echo "🛠️ 执行 API 物理对齐 (ethtool_keee)..."
          find . -type f -name "*.patch" -exec sed -i 's/struct ethtool_eee/struct ethtool_keee/g' {} +
          find . -type f -name "*.patch" -exec sed -i 's/\.supported/\.supported_u32/g' {} +

      - name: 3. 物理提交并永久回写
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add target/linux/mediatek/patches-6.6/
          if git commit -m "物理清淤：根据审计结果抹除 1xxx/2xxx/3xxx 冗余补丁"; then
            git push origin openwrt-24.10-6.6
            echo "🚀 源码已净化，截图中的垃圾补丁已彻底消失。"
          else
            echo "✨ 源码已是纯净状态。"
          fi
