name: 物理强删-从源头彻底抹除17xx补丁

on:
  workflow_dispatch: # 手动点击触发，执行“物理手术”

jobs:
  permanent_delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 物理授权：允许工作流回写仓库

    steps:
      - name: 1. 检出仓库 (带回写权限)
        uses: actions/checkout@v4
        with:
          # 必须检出你截图所在的 openwrt-24.10-6.6 分支
          ref: openwrt-24.10-6.6
          fetch-depth: 0

      - name: 2. 物理执行“外科手术”
        run: |
          TARGET_DIR="target/linux/mediatek/patches-6.6"
          echo "🔍 正在进入物理目录: $TARGET_DIR"
          
          if [ -d "$TARGET_DIR" ]; then
            cd $TARGET_DIR
            # 物理删除：所有以 999-17 开头的补丁文件 (包含 1708 等冲突源)
            echo "🧹 正在从源头物理抹除 17xx 系列..."
            rm -fv 999-17*.patch
            
            # 确认删除结果
            echo "📋 当前剩余补丁清单:"
            ls -1
          else
            echo "❌ 错误：找不到物理路径 $TARGET_DIR"
            exit 1
          fi

      - name: 3. 物理提交更改回 GitHub
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # 记录物理删除动作
          git add -u target/linux/mediatek/patches-6.6/
          
          # 物理回写：如果没有改动则跳过，有改动则强制提交并 Push
          if git commit -m "物理清淤：从源头彻底抹除 17xx 系列冲突补丁"; then
            echo "🚀 正在将删除操作物理推送到仓库源..."
            git push origin openwrt-24.10-6.6
          else
            echo "✨ 仓库已经是净化的，无需物理操作。"
          fi
