name: SL3000-Immortal-612-Exclusive

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone and Patch
        run: |
          # 1. 物理拉取
          git clone --depth 1 -b openwrt-24.10 https://github.com/immortalwrt/immortalwrt source-code
          cd source-code
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 2. 物理魔改 (6.12 内核与 1024M)
          sed -i 's/KERNEL_PATCHVER:=.*/KERNEL_PATCHVER:=6.12/g' target/linux/mediatek/Makefile
          [ -f "target/linux/mediatek/filogic/base-files/lib/upgrade/platform.sh" ] && sed -i 's/256m/1024m/g' target/linux/mediatek/filogic/base-files/lib/upgrade/platform.sh
          find package/ -name "woe_main.c" -exec sed -i 's/MODULE_SUPPORTED_DEVICE/\/\/MODULE_SUPPORTED_DEVICE/g' {} +

          # 3. 物理注入配置 (无 EOF，物理追加)
          echo "CONFIG_TARGET_mediatek=y" > .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_mediatek_mt7981-rfb=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt7531=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mediatek_hnat=y" >> .config
          echo "CONFIG_PACKAGE_fdisk=y" >> .config
          echo "CONFIG_PACKAGE_lsblk=y" >> .config
          make defconfig

      - name: Push to Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd source-code
          rm -rf .git
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat(sl3000): 6.12 kernel source"
          # 物理隔离 URL，彻底避开 YAML 冒号解析错误
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git remote add origin "$REMOTE_URL"
          git push -f origin master:refs/heads/sl3000-exclusive-612
