name: SL3000-6.6-Source-Fixed-Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)

      - name: Clone OpenWrt
        run: git clone https://github.com/ykm888/66.git -b openwrt-24.10-6.6 openwrt

      - name: Apply Physical Fixes
        run: |
          chmod +x scripts/sl3000-patch.sh
          cd openwrt && ../scripts/sl3000-patch.sh

      - name: Update Feeds
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Generate Config
        run: cd openwrt && make defconfig

      - name: Build Firmware
        run: |
          cd openwrt
          # 第一次执行用多线程，失败则自动切单线程导出错误日志
          make -j$(nproc) || make -j1 V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SL3000-Fixed-Firmware
          path: openwrt/bin/targets/mediatek/filogic/
