name: 司洛SL-3000 1024M 救砖 (像素级对齐最终版)

on:
  workflow_dispatch:

env:
  MY_REPO: ykm888/66
  FRAMEWORK_BRANCH: openwrt-24.10-6.6
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Main (获取补丁脚本与 8000 行配置)
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Initialization Environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/ant0ny-0/openwrt-scripts/master/depends-ubuntu-2204)
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Framework (物理获取修改后的 Makefile 底座)
      run: |
        git clone --depth 1 https://github.com/${{ env.MY_REPO }}.git -b ${{ env.FRAMEWORK_BRANCH }} $GITHUB_WORKSPACE/openwrt

    - name: Update & Install Feeds
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Execute Physical Patch (补丁物理缝合)
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        chmod +x $GITHUB_WORKSPACE/scripts/sl3000-patch.sh
        $GITHUB_WORKSPACE/scripts/sl3000-patch.sh

    - name: Download & Compile (物理极速构建)
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        make defconfig
        make download -j16
        # 物理策略：并行编译，若失败则单线程输出 V=s 日志
        make -j$(nproc) || make -j1 V=s

    - name: Organize Recovery Bundle (物理采集救砖全家桶)
      if: success()
      run: |
        mkdir -p $GITHUB_WORKSPACE/recovery_bundle
        # 物理进入编译产物目录
        cd $GITHUB_WORKSPACE/openwrt/bin/targets/mediatek/filogic
        # 物理提取关键救砖二进制文件
        cp *emmc-gpt.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-preloader.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-bl31-uboot.fip $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *factory.img.gz $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *sysupgrade.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        echo "FIRMWARE=$GITHUB_WORKSPACE/recovery_bundle" >> $GITHUB_ENV

    - name: Upload Artifacts (物理归档)
      uses: actions/upload-artifact@v4
      if: env.FIRMWARE != ''
      with:
        name: SL3000_1024M_Recovery_Bundle
        path: ${{ env.FIRMWARE }}/*

    - name: Release Final Firmware
      uses: softprops/action-gh-release@v2
      if: env.FIRMWARE != ''
      with:
        tag_name: SL3000_1024M_FINAL_${{ github.run_id }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          司洛 SL-3000 1024M 物理全闭环救砖固件
          - 源头物理对齐：已完成
          - 内存适配：1024M DDR3/4
          - 分区布局：eMMC GPT (64MB 核心区)
          - 核心组件：包含 GPT, Preloader, FIP, Factory
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
