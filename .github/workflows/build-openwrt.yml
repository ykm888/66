name: SL-3000 1024M 救砖 (本地集成最终版)

on:
  workflow_dispatch:
  push:
    branches: [ openwrt-24.10-6.6 ]
    paths:
      - 'scripts/sl3000-patch.sh'
      - 'custom-config/sl3000.config'
      - 'targets/mediatek/filogic/**'
      - 'package/boot/uboot-mediatek/**'

env:
  MY_REPO: ykm888/66
  FRAMEWORK_BRANCH: openwrt-24.10-6.6
  TZ: Asia/Shanghai
  CONFIG_FILE: custom-config/sl3000.config
  DIY_P2_SH: scripts/diy-part2.sh

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false

    steps:
    - name: Checkout Main
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 1

    - name: 初始化纯净环境
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file wget qemu-utils libyaml-dev device-tree-compiler
        sudo timedatectl set-timezone "${{ env.TZ }}"

    - name: 克隆定制框架
      run: |
        git clone --depth 1 https://github.com/${{ env.MY_REPO }}.git -b ${{ env.FRAMEWORK_BRANCH }} $GITHUB_WORKSPACE/openwrt

    - name: Update/Install feeds
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 应用定制配置
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        cp $GITHUB_WORKSPACE/${{ env.CONFIG_FILE }} .config
        make defconfig

    - name: 执行本地集成补丁脚本
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        chmod +x $GITHUB_WORKSPACE/${{ env.DIY_P2_SH }}
        $GITHUB_WORKSPACE/${{ env.DIY_P2_SH }}

    - name: 预编译工具链
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        make toolchain/compile -j$(nproc) V=s

    - name: 验证工具链完整性
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        if [ ! -f staging_dir/toolchain-aarch64_cortex-a53_gcc-13.3.0_musl/lib/ld-musl-aarch64.so.1 ]; then
          echo "ERROR: musl dynamic linker missing!"
          exit 1
        fi

    - name: 编译 U-Boot 救砖组件
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        make package/boot/uboot-mediatek/compile -j1 V=s

    - name: 验证 U-Boot 产物
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        if [ ! -f staging_dir/host/share/u-boot/mt7981-emmc-ddr3-bl2.bin ]; then
          echo "ERROR: BL2 not found!"
          exit 1
        fi
        if [ ! -f staging_dir/host/share/u-boot/mt7981-emmc-ddr3-fip.bin ]; then
          echo "ERROR: FIP not found!"
          exit 1
        fi

    - name: 完整固件编译
      id: compile
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        echo "Using $(nproc) threads for compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 整理救砖包
      if: steps.compile.outputs.status == 'success'
      run: |
        set -e
        mkdir -p $GITHUB_WORKSPACE/recovery_bundle
        BIN_DIR="$GITHUB_WORKSPACE/openwrt/bin/targets/mediatek/filogic"
        STAGING_BOOT="$GITHUB_WORKSPACE/openwrt/staging_dir/host/share/u-boot"

        cp -v $BIN_DIR/*factory.img.gz $GITHUB_WORKSPACE/recovery_bundle/
        cp -v $STAGING_BOOT/mt7981-emmc-ddr3-bl2.bin $GITHUB_WORKSPACE/recovery_bundle/emmc-preloader.bin
        cp -v $STAGING_BOOT/mt7981-emmc-ddr3-fip.bin $GITHUB_WORKSPACE/recovery_bundle/emmc-bl31-uboot.fip

        GPT_FILE=$(find $GITHUB_WORKSPACE/openwrt/build_dir/target-*/linux-mediatek_filogic/tmp -name "*gpt.bin" | head -n1)
        [ -n "$GPT_FILE" ] && cp -v $GPT_FILE $GITHUB_WORKSPACE/recovery_bundle/emmc-gpt.bin

        echo "FIRMWARE=$GITHUB_WORKSPACE/recovery_bundle" >> $GITHUB_ENV

    - name: 发布最终固件
      uses: softprops/action-gh-release@v2
      if: env.FIRMWARE != ''
      with:
        tag_name: SL3000_LOCAL_${{ github.run_id }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          ## 司洛 SL-3000 1024M 本地集成最终版构建成功

          ### 修复内容
          - ✅ U-Boot 源码本地集成（`file://src`），彻底解决远程拉取和补丁冲突
          - ✅ 删除所有官方补丁，确保无冲突
          - ✅ 系统依赖预装 `device-tree-compiler`，解决 dtc 问题
          - ✅ 先完整构建工具链，确保 musl 库文件生成
          - ✅ 优先编译 U-Boot，确保救砖组件提前就绪
          - ✅ BL2 来源修正、FIP 合成加入 BL2
          - ✅ 产物收集严格验证，避免缺件

          包含救砖文件：
          - `*factory.img.gz` — 完整固件
          - `emmc-preloader.bin` — 独立 Preloader (BL2)
          - `emmc-bl31-uboot.fip` — BL31 + U-Boot 的 FIP
          - `emmc-gpt.bin` — GPT 分区表（如有）
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
