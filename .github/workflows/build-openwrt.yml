name: SL-3000 1024M Firmware Build

on:
  repository_dispatch:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean

    - name: Clone source code
      run: |
        git clone --depth 1 https://github.com/immortalwrt/immortalwrt -b openwrt-24.10 openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e .config ] && mv .config openwrt/.config
        chmod +x sl3000-patch.sh
        ./sl3000-patch.sh

    - name: Download package
      run: |
        cd openwrt
        make defconfig
        make download -j8

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Organize files
      id: organize
      run: |
        cd openwrt/bin/targets/mediatek/filogic/
        rm -rf packages
        # 物理设置环境变量
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@main
      with:
        name: SL-3000-1024M-Firmware
        # 物理语法修复：使用 env.FIRMWARE
        path: ${{ env.FIRMWARE }}
