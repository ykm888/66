name: SL-3000-1024M-Physical-Fix

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. 物理环境初始化
        uses: actions/checkout@v4

      - name: 2. 安装编译依赖
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
          sudo timedatectl set-timezone "$TZ"

      - name: 3. 检出源码 (OpenWrt 6.6)
        run: |
          git clone --depth 1 -b openwrt-24.10-6.6 https://github.com/ykm888/66 openwrt

      - name: 4. 物理安装 Feeds 依赖 (解决 WARNING 关键步)
        run: |
          cd openwrt
          # 先更新索引，再强制安装，确保所有 libev/luci 等包物理存在
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 5. 注入 8000 行配置并执行优化脚本
        run: |
          # 从指定路径复制配置
          cp -v custom-config/sl3000.config openwrt/.config
          
          cd openwrt
          # 执行内核瘦身、1024M 定义及架构纠偏
          chmod +x ../scripts/sl3000-patch.sh
          ../scripts/sl3000-patch.sh

      - name: 6. 最终下载包与物理编译
        run: |
          cd openwrt
          # 根据最终 .config 下载源码包
          make download -j$(nproc)
          # 开始全流程编译
          make -j$(nproc) || make -j1 V=s

      - name: 7. 整理固件产物
        if: success()
        run: |
          cd openwrt/bin/targets/mediatek/filogic/
          mkdir -p /tmp/upload
          cp -v *sl_3000-emmc* /tmp/upload/ || true
          cp -v *emmc-gpt.bin *emmc-preloader.bin *emmc-bl31-uboot.fip /tmp/upload/ || true

      - name: 8. 发布到 Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: SL-3000-V2026-Final
          files: /tmp/upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
