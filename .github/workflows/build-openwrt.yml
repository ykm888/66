name: Build SL3000 Firmware

on:
  workflow_dispatch:          # 手动触发构建
  push:
    branches:
      - main                  # 当构建脚本或配置在 main 分支更新时触发
    paths:
      - 'scripts/**'
      - 'custom-config/**'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: custom-config/sl3000.config
  DIY_P1_SH: scripts/diy-part1.sh
  DIY_P2_SH: scripts/diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 物理检出当前仓库 (Main 分支)
        uses: actions/checkout@v4

      - name: 2. 物理初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/etc/vcpkg /usr/local/bin/terraform
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/ykm888/66/main/scripts/depends.txt)
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 3. 物理克隆 OpenWrt 源码
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 4. 加载自定义 Feeds
        run: |
          [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          ../$DIY_P1_SH

      - name: 5. 更新并安装 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 6. 运行 1024M 物理补丁脚本 (sl3000-patch.sh)
        run: |
          chmod +x scripts/sl3000-patch.sh
          ./scripts/sl3000-patch.sh

      - name: 7. 加载 8000 行配置并执行静默审计 (make defconfig)
        run: |
          # 物理移动仓库中已通过一键修复工作流洗白的配置
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          ../$DIY_P2_SH
          make defconfig
          # 检查物理配置是否包含必需的 1024M 无线固件包
          grep "CONFIG_PACKAGE_mt7981-wo-firmware=y" .config || echo "CONFIG_PACKAGE_mt7981-wo-firmware=y" >> .config

      - name: 8. 下载编译所需软件包 (Download)
        id: package
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 9. 物理启动固件编译
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          # 首次编译建议使用单线程以捕捉准确物理错误
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep "STRIP" .config && echo "bin_dir=true" >> $GITHUB_ENV

      - name: 10. 物理整理编译产物
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: 11. 上传固件到 GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware_sl3000_1024M
          path: ${{ env.FIRMWARE }}

      - name: 12. 物理发布到 Release
        uses: softprops/action-gh-release@v2
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          tag_name: SL3000-1024M-${{ github.run_id }}
          files: ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
