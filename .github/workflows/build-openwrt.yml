name: SL-3000 1024M 救砖 (物理闭环版·修复)

on:
  workflow_dispatch:

env:
  MY_REPO: ykm888/66
  FRAMEWORK_BRANCH: openwrt-24.10-6.6
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Main
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Initialization Environment (清理 + 安装依赖)
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo -E apt-get -qq update
        # 使用 OpenWrt 官方推荐的依赖包列表（稳定且安全）
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file wget qemu-utils
        sudo timedatectl set-timezone "${{ env.TZ }}"

    - name: Clone Framework
      run: |
        git clone --depth 1 https://github.com/${{ env.MY_REPO }}.git -b ${{ env.FRAMEWORK_BRANCH }} $GITHUB_WORKSPACE/openwrt

    - name: Update & Install Feeds
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Execute Physical Patch (修复版脚本)
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        chmod +x $GITHUB_WORKSPACE/scripts/sl3000-patch.sh
        $GITHUB_WORKSPACE/scripts/sl3000-patch.sh

    - name: Configure & Download
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        make defconfig
        make download -j8

    - name: Compile U-Boot First (强制打通隧道，提前暴露问题)
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        make package/boot/uboot-mediatek/compile -j1 V=s

    - name: Verify U-Boot Artifacts (检查关键文件是否生成)
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        if [ ! -f staging_dir/host/share/u-boot/mt7981-emmc-ddr3-bl2.bin ]; then
          echo "ERROR: BL2 file not found after U-Boot compile!"
          exit 1
        fi
        if [ ! -f staging_dir/host/share/u-boot/mt7981-emmc-ddr3-fip.bin ]; then
          echo "ERROR: FIP file not found after U-Boot compile!"
          exit 1
        fi
        echo "U-Boot artifacts verification passed."

    - name: Full Firmware Compile
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Organize Recovery Bundle (收割全家桶，带严格检查)
      if: success()
      run: |
        set -e  # 任何错误终止脚本
        mkdir -p $GITHUB_WORKSPACE/recovery_bundle
        BIN_DIR="$GITHUB_WORKSPACE/openwrt/bin/targets/mediatek/filogic"
        STAGING_BOOT="$GITHUB_WORKSPACE/openwrt/staging_dir/host/share/u-boot"

        # 1. 采集整机包（必需）
        if ls $BIN_DIR/*factory.img.gz 1> /dev/null 2>&1; then
          cp -v $BIN_DIR/*factory.img.gz $GITHUB_WORKSPACE/recovery_bundle/
        else
          echo "ERROR: factory image not found!"
          exit 1
        fi

        # 2. 提取独立的救砖组件 (Preloader/FIP)
        if [ -f "$STAGING_BOOT/mt7981-emmc-ddr3-bl2.bin" ]; then
          cp -v $STAGING_BOOT/mt7981-emmc-ddr3-bl2.bin $GITHUB_WORKSPACE/recovery_bundle/emmc-preloader.bin
        else
          echo "ERROR: BL2 not found in staging!"
          exit 1
        fi

        if [ -f "$STAGING_BOOT/mt7981-emmc-ddr3-fip.bin" ]; then
          cp -v $STAGING_BOOT/mt7981-emmc-ddr3-fip.bin $GITHUB_WORKSPACE/recovery_bundle/emmc-bl31-uboot.fip
        else
          echo "ERROR: FIP not found in staging!"
          exit 1
        fi

        # 3. 提取 GPT 分区表（可选，但尝试收集）
        GPT_FILE=$(find $GITHUB_WORKSPACE/openwrt/build_dir/target-*/linux-mediatek_filogic/tmp -name "*gpt.bin" | head -n1)
        if [ -n "$GPT_FILE" ]; then
          cp -v $GPT_FILE $GITHUB_WORKSPACE/recovery_bundle/emmc-gpt.bin
        else
          echo "Warning: GPT partition table not found, continuing..."
        fi

        echo "FIRMWARE=$GITHUB_WORKSPACE/recovery_bundle" >> $GITHUB_ENV

    - name: Release Final Firmware
      uses: softprops/action-gh-release@v2
      if: env.FIRMWARE != ''
      with:
        tag_name: SL3000_FIXED_${{ github.run_id }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          ## 司洛 SL-3000 1024M 物理闭环构建成功（修复版）

          ### 修复内容
          - ✅ BL2 来源修正：从 ATF 包正确获取
          - ✅ FIP 合成加入 BL2，符合平台启动要求
          - ✅ 依赖安装改用官方稳定列表
          - ✅ 产物收集严格验证，避免缺件
          - ✅ GPT 分区修改限定了设备范围

          包含以下救砖文件：
          - `*factory.img.gz` — 完整固件（刷入系统分区）
          - `emmc-preloader.bin` — 独立的 Preloader (BL2)
          - `emmc-bl31-uboot.fip` — 包含 BL31 + U-Boot 的 FIP
          - `emmc-gpt.bin` — GPT 分区表（如有）

          刷机方法请参考设备文档。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
