name: SL3000 Physical Final Build

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/ykm888/66.git
  REPO_BRANCH: openwrt-24.10-6.6
  DIY_P1_SH: 'scripts/sl3000-patch.sh'
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Scripts
      uses: actions/checkout@v4

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Your Private Source
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Execute Physical Patch
      run: |
        chmod +x $DIY_P1_SH
        cd openwrt
        # 一次性处理 U-Boot 重定向、架构锁定、内核补丁修复
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update & Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Finalize Configuration
      run: |
        cd openwrt
        # 强制清除可能存在的 x86 偏移配置
        sed -i 's/CONFIG_TARGET_x86=y/# CONFIG_TARGET_x86 is not set/' .config
        make defconfig

    - name: Download & Compile
      run: |
        cd openwrt
        make download -j8
        echo "Starting World Build..."
        # 此时内核补丁已修复，编译将顺利通过 mtk_eth_soc.o
        make -j$(nproc) || make -j1 V=s

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SL3000-Firmware
        path: openwrt/bin/targets/mediatek/filogic/
