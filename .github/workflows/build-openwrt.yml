name: SL-3000-1024M-Final-Build

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. 物理环境初始化
        uses: actions/checkout@v4

      - name: 2. 安装编译依赖
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
          sudo timedatectl set-timezone "$TZ"

      - name: 3. 物理对齐配置文件 (锁定 custom-config 路径)
        run: |
          echo "🔍 正在从 custom-config 同步 sl3000.config..."
          if [ -f "custom-config/sl3000.config" ]; then
              cp -v custom-config/sl3000.config ${{ github.workspace }}/sl3000.config
          else
              echo "❌ 错误: 在 custom-config/ 目录下找不到 sl3000.config"
              ls -R
              exit 1
          fi

      - name: 4. 检出源码 (OpenWrt 6.6)
        run: |
          git clone --depth 1 -b openwrt-24.10-6.6 https://github.com/ykm888/66 openwrt

      - name: 5. 注入配置与执行核心优化 (静默审计执行)
        run: |
          # 物理移动配置到源码目录并重命名
          cp -v ${{ github.workspace }}/sl3000.config ${{ github.workspace }}/openwrt/.config
          
          cd ${{ github.workspace }}/openwrt
          # 执行内核优化、1024M 定义注入、以及 Error 255 物理修复
          chmod +x ../scripts/sl3000-patch.sh
          ../scripts/sl3000-patch.sh

      - name: 6. 更新 Feeds 并下载包
        run: |
          cd ${{ github.workspace }}/openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a
          make download -j$(nproc)

      - name: 7. 物理级全流程编译
        run: |
          cd ${{ github.workspace }}/openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 8. 整理固件产物
        if: success()
        run: |
          cd ${{ github.workspace }}/openwrt/bin/targets/mediatek/filogic/
          mkdir -p /tmp/upload
          cp -v *sl_3000-emmc* /tmp/upload/ || true
          cp -v *emmc-gpt.bin *emmc-preloader.bin *emmc-bl31-uboot.fip /tmp/upload/ || true

      - name: 9. 发布到 Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: SL-3000-Final-v3
          files: /tmp/upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
