name: SL-3000-1024M-eMMC-Master-Build

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/ykm888/66
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: custom-config/sl3000.config
  DIY_P1_SH: scripts/sl3000-patch.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 物理环境检出 (Checkout)
        uses: actions/checkout@v4

      - name: 2. 初始化编译环境 (原文照抄 1版)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgpgme11-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-pyelftools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev usbutils wget bc jq pciutils
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 3. 克隆源码仓库 (Clone Source)
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt ${{ github.workspace }}/openwrt

      - name: 4. 加载自定义 Feeds (Update & Install Feeds)
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 5. 延续修复补丁 (Apply Fixed Patches)
        run: |
          mkdir -p openwrt/target/linux/mediatek/patches-6.6/
          [ -d patches ] && cp -f patches/*.patch openwrt/target/linux/mediatek/patches-6.6/ || echo "No custom patches found."

      - name: 6. 物理注入 DIY 脚本 (基于 2版工作流延续)
        run: |
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P1_SH
          ./$DIY_P1_SH
          cd openwrt
          make defconfig

      - name: 7. 下载编译依赖 (原文照抄 1版)
        run: |
          cd openwrt
          make download -j8

      - name: 8. 编译工具链与编译器 (强化物理修复)
        run: |
          cd openwrt
          # 增加编译完整 toolchain 逻辑，确保 gcc 物理存在
          make tools/compile -j$(nproc) || make tools/compile -j1 V=s
          make toolchain/compile -j$(nproc) || make toolchain/compile -j1 V=s

      - name: 9. 编译内核与驱动 (内核 6.6 物理编译)
        run: |
          cd openwrt
          # 将编译器路径加入环境变量
          PATH=$PATH:$(pwd)/staging_dir/toolchain-aarch64_cortex-a53_gcc-13.3.0_musl/bin
          make target/linux/compile -j$(nproc) || make target/linux/compile -j1 V=s

      - name: 10. 构建完整镜像 (原文照抄 1版)
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 11. 整理救砖全家桶 (原文照抄 1版)
        if: success()
        run: |
          cd openwrt/bin/targets/mediatek/filogic/
          mkdir -p recovery_kit
          cp -f *emmc-gpt.bin recovery_kit/ 2>/dev/null || true
          cp -f *emmc-preloader.bin recovery_kit/ 2>/dev/null || true
          cp -f *emmc-bl31-uboot.fip recovery_kit/ 2>/dev/null || true
          cp -f *-recovery.itb recovery_kit/ 2>/dev/null || true
          cp -f *factory.img.gz recovery_kit/ 2>/dev/null || true
          cp -f *sysupgrade.bin recovery_kit/ 2>/dev/null || true
          echo "FIRMWARE_PACK=$PWD/recovery_kit" >> $GITHUB_ENV

      - name: 12. 上传物理产物 (原文照抄 1版)
        uses: actions/upload-artifact@v4
        with:
          name: SL-3000-1024M-MASTER-KIT
          path: ${{ env.FIRMWARE_PACK }}/*
