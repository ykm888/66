name: SL3000-1024M-Final-Recovery-Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. 物理环境初始化 (工序一)
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig libpython3-dev qemu-utils
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: 2. 物理克隆固件源码 (工序二)
        run: |
          # 克隆包含你 DTS 和 MK 修改的分支
          git clone --depth 1 -b sl3000-padavan-2410 https://github.com/ykm888/66 openwrt

      - name: 3. 物理克隆救砖引导源 (工序三)
        run: |
          # 获取 1024M 补丁后的引导文件 (bl2/fip)
          git clone --depth 1 -b sl3000-uboot-base https://github.com/ykm888/66 uboot-base

      - name: 4. 物理提取引导文件 (工序四)
        run: |
          # 物理注入暂存区，供 MK 合成 factory.bin 使用
          mkdir -p openwrt/staging_dir/target-aarch64_generic_musl/image/
          cp uboot-base/bl2.bin openwrt/staging_dir/target-aarch64_generic_musl/image/mt7981-sl3000-bl2.bin || true
          cp uboot-base/fip.bin openwrt/staging_dir/target-aarch64_generic_musl/image/mt7981-sl3000-fip.bin || true

      - name: 5. 物理更新 Feeds (工序五)
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 6. 物理加载仓库专属配置 (工序六 - 修正)
        run: |
          cd openwrt
          # 物理拉取你指定的 sl3000.config 文件
          curl -fLo .config https://raw.githubusercontent.com/ykm888/66/main/custom-config/sl3000.config
          
          # 物理执行预处理，确保配置对齐
          make defconfig

      - name: 7. 物理预下载 (工序七)
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: 8. 物理执行 12 道工序编译 (工序八)
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 9. 物理产物搜集 (工序九)
        run: |
          cd openwrt
          mkdir -p out_images
          cp bin/targets/mediatek/filogic/*sl_3000-emmc* out_images/

      - name: 10. 物理上传救砖包 (工序十)
        uses: actions/upload-artifact@v4
        with:
          name: SL3000-1024M-Recovery-Pack
          path: openwrt/out_images/
