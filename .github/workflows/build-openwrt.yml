name: Build OpenWrt

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/ykm888/66
  REPO_BRANCH: openwrt-24.10-6.6
  CONFIG_FILE: custom-config/sl3000.config
  UBOOT_BRANCH: sl3000-uboot-base
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 物理检出当前仓库
        uses: actions/checkout@v4

      - name: 2. 物理初始化编译环境
        run: |
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 3. 物理克隆 OpenWrt 源码
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 4. 更新 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a

      - name: 5. 安装 Feeds
        run: |
          cd openwrt
          ./scripts/feeds install -a

      - name: 6. 运行 1024M 物理补丁脚本
        run: |
          chmod +x scripts/sl3000-patch.sh
          ./scripts/sl3000-patch.sh ${{ env.UBOOT_BRANCH }}

      - name: 7. 加载已洗白配置并物理锁死 Warp
        run: |
          cp "$CONFIG_FILE" openwrt/.config
          cd openwrt
          make defconfig
          # 物理执行锁死：确保掐死 Warp
          sed -i '/CONFIG_PACKAGE_kmod-mtk-warp/d' .config
          echo "# CONFIG_PACKAGE_kmod-mtk-warp is not set" >> .config
          echo "CONFIG_PACKAGE_kmod-mtk-warp=n" >> .config
          make oldconfig

      - name: 8. 下载编译所需软件包
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: 9. 物理启动固件编译
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 10. 物理整理编译产物
        run: |
          cd openwrt/bin/targets/*/*
          [ -f "$GITHUB_WORKSPACE/sl3000-uboot.bin" ] && cp "$GITHUB_WORKSPACE/sl3000-uboot.bin" .
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: 11. 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_SL3000_1024M
          path: ${{ env.FIRMWARE }}/*

      - name: 12. 发布救砖全家桶到 Release
        uses: softprops/action-gh-release@v2
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag_name: SL3000-1024M-${{ github.run_id }}
          files: ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
