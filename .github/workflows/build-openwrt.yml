name: 司洛SL-3000 EMMC 1024M 救砖 (物理闭环彻底修复版)

on:
  workflow_dispatch:

env:
  # 物理框架源 (你的 openwrt-24.10-6.6 分支)
  REPO_URL: https://github.com/ykm888/66
  REPO_BRANCH: openwrt-24.10-6.6
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Initialization Environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/ant0ny-0/openwrt-scripts/master/depends-ubuntu-2204)
        sudo timedatectl set-timezone "$TZ"

    - name: Clone OpenWrt Framework
      run: |
        # 物理克隆至 $GITHUB_WORKSPACE/openwrt，确保 scripts/feeds 物理存在
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH $GITHUB_WORKSPACE/openwrt

    - name: Update & Install Feeds
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        chmod +x ./scripts/feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Physical Inject & Patch
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        # 赋予补丁脚本物理执行权，并执行
        chmod +x scripts/sl3000-patch.sh
        ./scripts/sl3000-patch.sh || (echo "物理补丁执行中存在非致命跳过"; exit 0)

    - name: Download Packages
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        make defconfig
        # 物理下载：系统将拉取你 sl3000-uboot-base 分支下的全量 U-Boot 源码
        make download -j8

    - name: Compile Firmware
      id: compile
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        # 执行物理构建
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize Recovery Bundle
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p $GITHUB_WORKSPACE/recovery_bundle
        cd $GITHUB_WORKSPACE/openwrt/bin/targets/mediatek/filogic
        cp *factory.img.gz $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-gpt.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-preloader.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-bl31-uboot.fip $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        echo "FIRMWARE=$GITHUB_WORKSPACE/recovery_bundle" >> $GITHUB_ENV

    - name: Release Artifacts
      uses: softprops/action-gh-release@v2
      if: env.FIRMWARE != ''
      with:
        tag_name: SL3000_1024M_SUCCESS_${{ github.run_id }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          SL-3000 1024M 物理全量救砖包
          - 彻底修复了 Makefile 注入导致的 Exit 1 错误
          - U-Boot 源码物理劫持自 sl3000-uboot-base 分支
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
