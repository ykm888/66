name: Build SL3000 Factory Recovery Firmware

on:
  push:
    branches:
      - openwrt-24.10-6.6
  workflow_dispatch:

env:
  REPO_URL: https://github.com/ykm888/66
  REPO_BRANCH: openwrt-24.10-6.6
  CONFIG_FILE: custom-config/sl3000.config
  DIY_SH: scripts/sl3000-patch.sh

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.REPO_BRANCH }}

      - name: Initialization environment
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/ant0ny-0/openwrt-scripts/master/depends-ubuntu-2204)
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Update & Install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply Local Config & Pre-patch
        run: |
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE .config
          chmod +x $DIY_SH
          ./$DIY_SH

      - name: Download package
        run: |
          make defconfig
          make download -j8

      - name: Pre-compile Source Fix (Critical)
        run: |
          # 针对救砖包编译过程中涉及的内核源码进行二次修复
          ./$DIY_SH

      - name: Compile the firmware
        run: |
          # 开始物理编译，目标包含 factory 镜像
          make -j$(nproc) || make -j1 V=s

      - name: Upload Recovery Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SL3000-Recovery-Bundle
          path: |
            bin/targets/mediatek/filogic/*factory.img.gz
            bin/targets/mediatek/filogic/*emmc-gpt.bin
            bin/targets/mediatek/filogic/*emmc-preloader.bin
            bin/targets/mediatek/filogic/*emmc-bl31-uboot.fip
            bin/targets/mediatek/filogic/*sysupgrade.bin
