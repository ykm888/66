name: SL3000 Absolute Immutable Build

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/ykm888/66.git
  REPO_BRANCH: openwrt-24.10-6.6
  DIY_SH: 'scripts/sl3000-patch.sh'
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Scripts
      uses: actions/checkout@v4

    - name: Init Environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Source
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Execute Script Patch
      run: |
        chmod +x $DIY_SH
        cd openwrt && $GITHUB_WORKSPACE/$DIY_SH

    - name: Update & Install Feeds
      run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: Generate Config
      run: |
        cd openwrt
        printf "CONFIG_TARGET_mediatek=y\nCONFIG_TARGET_mediatek_filogic=y\nCONFIG_TARGET_mediatek_filogic_DEVICE_sl_3000-emmc=y\n" >> .config
        make defconfig

    - name: Download & Prepare Kernel
      run: |
        cd openwrt
        make download -j8
        make target/linux/prepare -j$(nproc) V=s

    - name: Forced Physical Inject (动态定位手术版)
      run: |
        cd openwrt
        echo "开始动态寻址物理手术..."
        # 自动搜索 build_dir 下真实的驱动源码路径
        TARGET_H=$(find build_dir/ -name "mtk_eth_soc.h" | grep "mediatek/mtk_eth_soc.h" | head -n 1)
        TARGET_C=$(find build_dir/ -name "mtk_eth_soc.c" | grep "mediatek/mtk_eth_soc.c" | head -n 1)

        if [ -f "$TARGET_H" ]; then
            echo "🎯 物理命中：$TARGET_H"
            MACROS="#define HIT_BIND_FORCE_TO_CPU 0x0b\n#define MTK_FE_START_RESET 0x01\n#define MTK_FE_RESET_DONE 0x02\n#define MTK_FE_RESET_NAT_DONE 0x03\n#define MTK_WIFI_RESET_DONE 0x04\n#define MTK_WIFI_CHIP_ONLINE 0x05\n#define MTK_WIFI_CHIP_OFFLINE 0x06"
            
            # 暴力注入宏定义与结构体更名
            sed -i "/#define MTK_ETH_SOC_H/a $MACROS" "$TARGET_H"
            sed -i 's/ethtool_eee/ethtool_keee/g' "$TARGET_C"
            sed -i 's/ethtool_eee/ethtool_keee/g' "$TARGET_H"
            
            # 物理审计：如果注入失败则中断
            grep -q "HIT_BIND_FORCE_TO_CPU" "$TARGET_H" || (echo "❌ 手术失败！" && exit 1)
            echo "✅ 手术成功，物理校验通过。"
        else
            echo "❌ 物理脱靶：未找到目标文件，正在打印目录树..."
            find build_dir/ -maxdepth 8 -name "mtk_eth_soc.h"
            exit 1
        fi

    - name: Final Build
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SL3000-Final-Firmware
        path: openwrt/bin/targets/mediatek/filogic/
