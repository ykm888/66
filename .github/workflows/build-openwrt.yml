name: Build SL3000 Firmware

on:
  push:
    branches:
      - openwrt-24.10-6.6  # 物理监听你自己的分支变动
  workflow_dispatch:      # 支持手动触发

env:
  # 源码源：物理锁定为您自己的仓库地址
  REPO_URL: https://github.com/ykm888/66
  REPO_BRANCH: openwrt-24.10-6.6
  # 配置与脚本路径：基于仓库根目录的物理路径
  CONFIG_FILE: custom-config/sl3000.config
  DIY_SH: scripts/sl3000-patch.sh

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.REPO_BRANCH }} # 物理拉起指定分支

      - name: Initialization environment
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/ant0ny-0/openwrt-scripts/master/depends-ubuntu-2204)
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Update & Install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply Local Config & Pre-patch
        run: |
          # 1. 物理对齐 8000 多行的本地配置
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE .config
          # 2. 执行物理修复脚本
          chmod +x $DIY_SH
          ./$DIY_SH

      - name: Download package
        run: |
          make defconfig
          make download -j8

      - name: Pre-compile Source Fix (Critical Interception)
        run: |
          # 第二次物理拦截：针对解压后的内核源码执行截肢手术，确保 Error 1 不再复现
          ./$DIY_SH

      - name: Compile the firmware
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SL3000-eMMC-Firmware
          path: |
            bin/targets/mediatek/filogic/*.bin
            bin/targets/mediatek/filogic/*.img.gz
