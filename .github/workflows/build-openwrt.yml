name: 司洛SL-3000 1024M 救砖 (物理自愈最终版)

on:
  workflow_dispatch:

env:
  MY_REPO: ykm888/66
  FRAMEWORK_BRANCH: openwrt-24.10-6.6
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Main (获取补丁与配置)
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Initialization Environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/ant0ny-0/openwrt-scripts/master/depends-ubuntu-2204)
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Framework (物理获取修正后的 Makefile)
      run: |
        git clone --depth 1 https://github.com/${{ env.MY_REPO }}.git -b ${{ env.FRAMEWORK_BRANCH }} $GITHUB_WORKSPACE/openwrt

    - name: Update & Install Feeds
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Execute Physical Patch (补丁物理缝合)
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        chmod +x $GITHUB_WORKSPACE/scripts/sl3000-patch.sh
        $GITHUB_WORKSPACE/scripts/sl3000-patch.sh

    - name: Configuration with Self-healing (配置自愈重试)
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        # 第一轮尝试：全量配置对齐
        if ! make defconfig; then
          echo "物理警告：全量配置死锁！启动自愈：物理切除冲突插件..."
          # 自愈策略：强行删除所有插件配置（CONFIG_PACKAGE_），保留核心架构定义
          sed -i '/CONFIG_PACKAGE_/d' .config
          # 二次注入核心身份
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_sl_3000-emmc=y" >> .config
          echo "物理自愈：已回退至核心模式，执行二次对齐..."
          make defconfig || (echo "物理崩溃：自愈失败，上传存证..." && exit 1)
        fi
        make download -j16

    - name: Compile (物理极速构建)
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        # 并行失败则自动转为单线程输出 V=s 日志
        make -j$(nproc) || make -j1 V=s

    - name: Organize Recovery Bundle (物理产物动态采集)
      if: success()
      run: |
        mkdir -p $GITHUB_WORKSPACE/recovery_bundle
        BIN_DIR="$GITHUB_WORKSPACE/openwrt/bin/targets/mediatek/filogic"
        cd "$BIN_DIR"
        
        echo "=== 物理产物清单审计 ==="
        ls -lh
        echo "========================"

        # 动态通配符采集，确保不漏掉任何救砖组件
        cp -v *gpt.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp -v *preloader*.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp -v *bl31-uboot.fip $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp -v *factory.img.gz $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp -v *sysupgrade.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp -v *recovery.itb $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true

        echo "FIRMWARE=$GITHUB_WORKSPACE/recovery_bundle" >> $GITHUB_ENV

    - name: Upload Config on Failure (失败现场存证)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: config-debug-report
        path: ${{ github.workspace }}/openwrt/.config

    - name: Release Final Firmware
      uses: softprops/action-gh-release@v2
      if: env.FIRMWARE != ''
      with:
        tag_name: SL3000_1024M_FINAL_${{ github.run_id }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          司洛 SL-3000 1024M 物理全闭环救砖固件
          - 自愈机制：已通过物理切除逻辑绕过 olddefconfig 阻塞
          - 核心组件：包含 GPT, Preloader, FIP, Factory (救砖全家桶)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
