name: Build OpenWrt

on:
  workflow_dispatch:          # 手动触发，锁定定版逻辑

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: openwrt-24.10-6.6        # 锁定：构建克隆源码分支
  CONFIG_FILE: custom-config/sl3000.config  # 锁定：config配置路径
  UBOOT_BRANCH: sl3000-uboot-base       # 锁定：构建u-boot分支
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 物理检出当前仓库
        uses: actions/checkout@v4

      - name: 2. 物理初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/etc/vcpkg /usr/local/bin/terraform
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/ykm888/66/main/scripts/depends.txt)
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 3. 物理克隆 OpenWrt 源码
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 4. 加载自定义 Feeds (物理还原)
        run: |
          [ -e feeds.conf.default ] && cp feeds.conf.default openwrt/feeds.conf.default || echo "使用默认Feeds"

      - name: 5. 更新并安装 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 6. 运行 1024M 物理补丁脚本 (延续U-Boot构建设置)
        run: |
          # 像素级路径锁定：scripts/sl3000-patch.sh
          # 同时传入 U-Boot 分支变量供脚本调用
          chmod +x scripts/sl3000-patch.sh
          ./scripts/sl3000-patch.sh ${{ env.UBOOT_BRANCH }}

      - name: 7. 加载已洗白配置
        run: |
          if [ -f "$CONFIG_FILE" ]; then
            cp "$CONFIG_FILE" openwrt/.config
          else
            echo "❌ 错误: $CONFIG_FILE 缺失"
            exit 1
          fi
          cd openwrt
          make defconfig

      - name: 8. 下载编译所需软件包
        id: package
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 9. 物理启动固件编译
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 V=s || exit 1
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 10. 物理整理编译产物
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          # 物理对齐：如果脚本生成了 u-boot.bin，一并拷贝至此打包
          [ -f "$GITHUB_WORKSPACE/u-boot.bin" ] && cp "$GITHUB_WORKSPACE/u-boot.bin" .
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 11. 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SL3000-Full-Kit
          path: ${{ env.FIRMWARE }}

      - name: 12. 发布救砖全家桶到 Release
        uses: softprops/action-gh-release@v2
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          tag_name: SL3000-Recovery-${{ github.run_id }}
          files: ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
