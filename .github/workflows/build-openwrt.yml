name: SL3000-Full-Fixed-Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 环境初始化 (Ubuntu 22.04)
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: 克隆 OpenWrt 源码 (6.6)
        run: git clone https://github.com/ykm888/66.git -b openwrt-24.10-6.6 openwrt

      - name: 执行物理修复脚本 (解决路径报错)
        run: |
          # 物理锁定权限：确保根目录下的脚本可执行
          chmod +x scripts/sl3000-patch.sh
          # 进入 openwrt 运行脚本修改内核源码
          cd openwrt
          bash ../scripts/sl3000-patch.sh

      - name: 注入 8000行 Config 并安装 Feeds
        run: |
          # 物理拷贝仓库配置到编译目录
          cp custom-config/sl3000.config openwrt/.config
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a
          # 静默审计：补全依赖并验证配置一致性
          make defconfig

      - name: 编译固件 (MT7981 1024M)
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 收集编译产物
        uses: actions/upload-artifact@v4
        with:
          name: SL3000-eMMC-1024M-Firmware
          path: openwrt/bin/targets/mediatek/filogic/*.bin
