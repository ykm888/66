name: Build OpenWrt

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/ykm888/66
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: custom-config/sl3000.config
  UBOOT_BRANCH: sl3000-uboot-base
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 物理检出当前仓库
        uses: actions/checkout@v4

      - name: 2. 物理初始化编译环境
        run: |
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 3. 物理克隆 OpenWrt 源码
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 4. 更新并安装 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 5. 运行 1024M 物理补丁脚本
        run: |
          chmod +x scripts/sl3000-patch.sh
          ./scripts/sl3000-patch.sh ${{ env.UBOOT_BRANCH }}

      - name: 6. 加载配置并编译
        run: |
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          cd openwrt
          make defconfig
          make -j$(nproc)

      - name: 7. 物理整理并发布
        run: |
          cd openwrt/bin/targets/*/*
          [ -f "$GITHUB_WORKSPACE/sl3000-uboot.bin" ] && cp "$GITHUB_WORKSPACE/sl3000-uboot.bin" .
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: 8. 发布到 Release
        uses: softprops/action-gh-release@v2
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag_name: SL3000-Full-Kit-${{ github.run_id }}
          files: ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
