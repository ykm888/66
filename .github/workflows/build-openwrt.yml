name: SL-3000 1024M 救砖 (像素级物理对齐版)

on:
  workflow_dispatch:

env:
  MY_REPO: ykm888/66
  FRAMEWORK_BRANCH: openwrt-24.10-6.6
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Main (获取脚本与配置)
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Initialization Environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/ant0ny-0/openwrt-scripts/master/depends-ubuntu-2204)
        sudo timedatectl set-timezone "${{ env.TZ }}"

    - name: Clone Framework (物理获取 Makefile 分支)
      run: |
        # 物理克隆框架，建立构建根目录
        git clone --depth 1 https://github.com/${{ env.MY_REPO }}.git -b ${{ env.FRAMEWORK_BRANCH }} $GITHUB_WORKSPACE/openwrt

    - name: Update & Install Feeds
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Execute Physical Patch (补丁物理缝合)
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        # 延续逻辑：调用脚本注入你保存好的修复版 Makefile 和 filogic.mk
        chmod +x $GITHUB_WORKSPACE/scripts/sl3000-patch.sh
        $GITHUB_WORKSPACE/scripts/sl3000-patch.sh
        
        # 物理静默审计：确保补丁生效，防止旧文件干扰
        echo "--- GPT 分区表补丁校验 ---"
        grep "Size@Offset" target/linux/mediatek/image/filogic.mk || (echo "ERROR: Patch not applied!" && exit 1)

    - name: Download & Compile
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        make defconfig
        make download -j16
        
        # 【核心时序修复】强制先单线程编译 U-Boot，确保物理隧道产物（bl2/fip）先行就位
        # 这一步是为了根治 "No such file or directory" 的目录竞争问题
        make package/boot/uboot-mediatek/compile -j1 V=s
        
        # 开始全局镜像缝合
        make -j$(nproc) || make -j1 V=s

    - name: Organize Recovery Bundle (物理产物深度收割)
      if: success()
      run: |
        mkdir -p $GITHUB_WORKSPACE/recovery_bundle
        BIN_DIR="$GITHUB_WORKSPACE/openwrt/bin/targets/mediatek/filogic"
        STAGING_BOOT="$GITHUB_WORKSPACE/openwrt/staging_dir/host/share/u-boot"
        
        cd "$BIN_DIR"
        # 1. 采集缝合好的整机包和系统包
        cp -v *factory.img.gz $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp -v *sysupgrade.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        
        # 2. 从物理隧道直接提取最底层的救砖组件（确保是最新编出来的）
        echo "--- 正在收割物理隧道产物 ---"
        if [ -d "$STAGING_BOOT" ]; then
            cp -v $STAGING_BOOT/mt7981-emmc-ddr3-bl2.bin $GITHUB_WORKSPACE/recovery_bundle/emmc-preloader.bin || true
            cp -v $STAGING_BOOT/mt7981-emmc-ddr3-fip.bin $GITHUB_WORKSPACE/recovery_bundle/emmc-bl31-uboot.fip || true
            # 这里的 GPT 是镜像构建过程生成的
            cp -v "$GITHUB_WORKSPACE/openwrt/build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_filogic/tmp/"*gpt.bin $GITHUB_WORKSPACE/recovery_bundle/emmc-gpt.bin 2>/dev/null || true
        fi

        # 物理记录路径供 Release 使用
        echo "FIRMWARE=$GITHUB_WORKSPACE/recovery_bundle" >> $GITHUB_ENV

    - name: Release Final Firmware
      uses: softprops/action-gh-release@v2
      if: env.FIRMWARE != ''
      with:
        tag_name: SL3000_1024M_SUCCESS_${{ github.run_id }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          司洛 SL-3000 1024M 物理全闭环构建成功
          
          【组件清单】
          1. factory.img.gz : 64MB 编程器整机刷机包 (含 GPT+BL2+FIP+RootFS)
          2. emmc-preloader.bin : DDR3 1024M 初始化引导 (BL2)
          3. emmc-bl31-uboot.fip : ATF + U-Boot 交互控制台
          4. emmc-gpt.bin : 物理分区表定义
          
          【物理状态】
          - 内存适配：1024M DDR3
          - 分区格式：Size@Offset 物理对齐
          - 编译模式：U-Boot 强制优先编译
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
