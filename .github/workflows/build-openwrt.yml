name: 司洛SL-3000 EMMC 1024M 救砖 (绝对路径修复版)

on:
  workflow_dispatch:
  repository_dispatch:

env:
  REPO_URL: https://github.com/ykm99999/66
  REPO_BRANCH: sl3000-uboot-base
  CONFIG_URL: https://raw.githubusercontent.com/ykm888/66/main/custom-config/sl3000.config
  SCRIPT_URL: https://raw.githubusercontent.com/ykm888/66/main/scripts/sl3000-patch.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/ant0ny-0/openwrt-scripts/master/depends-ubuntu-2204)
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        # 使用绝对路径确保物理位置唯一性
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH $GITHUB_WORKSPACE/openwrt

    - name: Update & Install feeds
      run: |
        # 物理对齐：直接进入绝对路径执行，不依赖 working-directory 属性
        cd $GITHUB_WORKSPACE/openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Fetch Remote Assets & Pre-patch
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        # 物理注入配置与脚本
        curl -fsSL $CONFIG_URL > .config
        curl -fsSL $SCRIPT_URL > sl3000-patch.sh
        chmod +x sl3000-patch.sh
        # 第一次物理拦截
        ./sl3000-patch.sh

    - name: Download package
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Pre-compile Source Fix (Critical)
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        # 第二次物理拦截：修复内核解压后的 Error 1
        ./sl3000-patch.sh

    - name: Compile the firmware
      id: compile
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize Recovery Bundle
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        # 物理路径全量追踪
        mkdir -p $GITHUB_WORKSPACE/recovery_bundle
        cd $GITHUB_WORKSPACE/openwrt/bin/targets/mediatek/filogic
        cp *factory.img.gz $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-gpt.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-preloader.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-bl31-uboot.fip $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *sysupgrade.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        echo "FIRMWARE=$GITHUB_WORKSPACE/recovery_bundle" >> $GITHUB_ENV

    - name: Upload Recovery Artifacts
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: SL3000-Recovery-Bundle
        path: ${{ env.FIRMWARE }}/*

    - name: Release Recovery Firmware
      uses: softprops/action-gh-release@v2
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        tag_name: SL3000_RECOVERY_1024M_${{ github.run_id }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          SL-3000 1024M 绝对路径修复版
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
