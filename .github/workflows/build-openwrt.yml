name: 物理强删-源头彻底净化-终极回写版

on:
  workflow_dispatch: # 手动点击触发

jobs:
  permanent_delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须：授权回写权限

    steps:
      - name: 1. 检出仓库 (浅克隆极速加速)
        uses: actions/checkout@v4
        with:
          ref: openwrt-24.10-6.6
          fetch-depth: 1 # ⚡ 核心修复：防止卡死
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. 执行物理“外科手术”级清淤
        run: |
          TARGET_DIR="target/linux/mediatek/patches-6.6"
          echo "🔍 正在进入物理目录: $TARGET_DIR"
          cd $TARGET_DIR
          
          # A. 物理抹除所有针对 MT7988 (不相关硬件) 的补丁 (解决 250 号等报错)
          echo "🧹 抹除 MT7988 相关干扰..."
          find . -type f -name "*mt7988*" -delete
          
          # B. 物理抹除所有针对 MT753x (外部交换机) 的补丁
          echo "🧹 抹除 MT753x 相关冗余..."
          find . -type f -name "*mt753x*" -delete
          
          # C. 物理抹除 999 系列 (保留 998 风扇补丁)
          echo "🧹 抹除非官方 999 增强系列..."
          find . -name "999-*.patch" ! -name "998-pwm-fan-fix.patch" -delete
          
          # D. 物理抹除末尾冲突源 (9997-9999)
          rm -fv 9997-*.patch 9998-*.patch 9999-*.patch || true

          # E. API 物理对齐 (ethtool_keee)
          echo "🛠️ 执行内容级 API 物理对齐..."
          find . -type f -name "*.patch" -exec sed -i 's/struct ethtool_eee/struct ethtool_keee/g' {} +
          find . -type f -name "*.patch" -exec sed -i 's/\.supported/\.supported_u32/g' {} +

          echo "📋 物理审计：当前净化后的补丁清单:"
          ls -1

      - name: 3. 物理强推回写 (Force Push)
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add -A .
          if git commit -m "物理清淤：基于硬件关键词彻底净化补丁集并对齐API"; then
            echo "🚀 正在物理强制推送至 openwrt-24.10-6.6..."
            git push origin HEAD:openwrt-24.10-6.6 --force
          else
            echo "✨ 仓库已经是净化的，无需操作。"
          fi
