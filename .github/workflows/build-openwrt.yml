name: SL3000 Final Physical Fix

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/ykm888/66.git
  REPO_BRANCH: openwrt-24.10-6.6
  DIY_SH: 'scripts/sl3000-patch.sh'
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Scripts
      uses: actions/checkout@v4

    - name: Init Environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Source
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Execute Script Patch
      run: |
        chmod +x $DIY_SH
        # 脚本内含：删除冲突补丁、重定向 U-Boot、锁定架构
        cd openwrt && $GITHUB_WORKSPACE/$DIY_SH

    - name: Update Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate Config
      run: |
        cd openwrt
        # 物理注入设备锁定，确保 defconfig 走 SL3000 路径
        printf "CONFIG_TARGET_mediatek=y\nCONFIG_TARGET_mediatek_filogic=y\nCONFIG_TARGET_mediatek_filogic_DEVICE_sl_3000-emmc=y\n" >> .config
        make defconfig

    - name: Download Packages
      run: cd openwrt && make download -j8

    - name: Prepare Kernel & Forced Physical Inject
      run: |
        cd openwrt
        # 1. 强制解压内核源码并应用现存补丁
        make target/linux/prepare -j$(nproc) V=s
        
        # 2. 物理定位：直接锁定 linux-6.6.95 目录
        cd build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_filogic/linux-6.6.95/
        
        echo "正在执行暴力物理手术：修复 mtk_eth_soc 缺失宏定义"
        
        # 构造宏定义块
        MACROS="#define HIT_BIND_FORCE_TO_CPU 0x0b\n#define MTK_FE_START_RESET 0x01\n#define MTK_FE_RESET_DONE 0x02\n#define MTK_FE_RESET_NAT_DONE 0x03\n#define MTK_WIFI_RESET_DONE 0x04\n#define MTK_WIFI_CHIP_ONLINE 0x05\n#define MTK_WIFI_CHIP_OFFLINE 0x06"

        # 物理插入到头文件保护宏之后
        sed -i "/#define MTK_ETH_SOC_H/a $MACROS" drivers/net/ethernet/mediatek/mtk_eth_soc.h
        
        # 物理对齐结构体名（确保 keee 适配）
        sed -i 's/ethtool_eee/ethtool_keee/g' drivers/net/ethernet/mediatek/mtk_eth_soc.c
        sed -i 's/ethtool_eee/ethtool_keee/g' drivers/net/ethernet/mediatek/mtk_eth_soc.h
        
        # 3. 物理审计检查：如果 grep 找不到说明手术失败，立即中断防止浪费资源
        echo "检查宏定义注入状态..."
        if grep -q "HIT_BIND_FORCE_TO_CPU" drivers/net/ethernet/mediatek/mtk_eth_soc.h; then
            echo "✅ 宏定义注入成功！"
        else
            echo "❌ 宏定义注入失败！请检查路径。"
            exit 1
        fi

    - name: Final Compilation
      run: |
        cd openwrt
        # 核心编译阶段
        make -j$(nproc) || make -j1 V=s

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SL3000-Immutable-Firmware
        path: |
          openwrt/bin/targets/mediatek/filogic/
