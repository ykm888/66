name: 司洛SL-3000 1024M 救砖 (三分支物理闭合版)

on:
  workflow_dispatch:

env:
  # 物理分支定义
  MY_REPO: ykm888/66
  FRAMEWORK_BRANCH: openwrt-24.10-6.6
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Main (获取脚本与配置)
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Initialization Environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/ant0ny-0/openwrt-scripts/master/depends-ubuntu-2204)
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Framework Branch
      run: |
        # 物理构建：拉取 openwrt-24.10-6.6 分支作为编译底座
        git clone --depth 1 https://github.com/${{ env.MY_REPO }}.git -b ${{ env.FRAMEWORK_BRANCH }} $GITHUB_WORKSPACE/openwrt

    - name: Update & Install Feeds
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Execute Physical Patch (三位一体对齐)
      run: |
        # 核心修复：进入子目录，通过绝对路径调用 main 分支的脚本
        cd $GITHUB_WORKSPACE/openwrt
        chmod +x $GITHUB_WORKSPACE/scripts/sl3000-patch.sh
        $GITHUB_WORKSPACE/scripts/sl3000-patch.sh

    - name: Download & Pre-compile
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        # 此时脚本已完成 U-Boot 源劫持和 Config 注入
        make defconfig
        make download -j8

    - name: Compile Recovery Firmware
      id: compile
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        # 执行物理级全量构建
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize Recovery Bundle
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p $GITHUB_WORKSPACE/recovery_bundle
        cd $GITHUB_WORKSPACE/openwrt/bin/targets/mediatek/filogic
        # 物理搜集救砖全家桶
        cp *factory.img.gz $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-gpt.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-preloader.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-bl31-uboot.fip $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        echo "FIRMWARE=$GITHUB_WORKSPACE/recovery_bundle" >> $GITHUB_ENV

    - name: Release Artifacts
      uses: softprops/action-gh-release@v2
      if: env.FIRMWARE != ''
      with:
        tag_name: SL3000_1024M_SUCCESS_${{ github.run_id }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          司洛 SL-3000 1024M 物理全闭环救砖包
          - 分支溯源：main(脚本/配置) + openwrt-24.10-6.6(框架) + sl3000-uboot-base(源码)
          - 适配内存：1024M (DRAM_BANKS=1)
          - 救砖功能：内置 Web FailSafe (192.168.1.1)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
