name: SL3000 Final Immutable Build

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/ykm888/66.git
  REPO_BRANCH: openwrt-24.10-6.6
  DIY_SH: 'scripts/sl3000-patch.sh'
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Scripts
      uses: actions/checkout@v4

    - name: Init Environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Source
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Execute Script Patch
      run: |
        chmod +x $DIY_SH
        cd openwrt && $GITHUB_WORKSPACE/$DIY_SH

    - name: Update Feeds
      run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: Generate Config
      run: cd openwrt && make defconfig

    - name: Download Packages
      run: cd openwrt && make download -j8

    - name: Prepare Kernel & Physical Inject (物理补完)
      run: |
        cd openwrt
        # 1. 强制解压内核源码并应用“存活”的补丁
        make target/linux/prepare -j$(nproc) V=s
        
        # 2. 定位源码目录（物理锁定 linux-6.6.95）
        K_DIR=$(find build_dir/ -name "linux-6.6.95" -type d | head -n 1)
        ETH_H="$K_DIR/drivers/net/ethernet/mediatek/mtk_eth_soc.h"
        ETH_C="$K_DIR/drivers/net/ethernet/mediatek/mtk_eth_soc.c"
        
        if [ -f "$ETH_H" ]; then
            echo "正在执行物理源码手术：$ETH_H"
            # 物理注入缺失的宏定义，确保编译不再 undeclared
            sed -i '/#define MTK_ETH_SOC_H/a #define HIT_BIND_FORCE_TO_CPU 0x0b\n#define MTK_FE_START_RESET 0x01\n#define MTK_FE_RESET_DONE 0x02\n#define MTK_FE_RESET_NAT_DONE 0x03\n#define MTK_WIFI_RESET_DONE 0x04\n#define MTK_WIFI_CHIP_ONLINE 0x05\n#define MTK_WIFI_CHIP_OFFLINE 0x06' "$ETH_H"
            
            # 将冲突补丁没能完成的结构体替换，通过 sed 直接在源码完成
            sed -i 's/ethtool_eee/ethtool_keee/g' "$ETH_C"
            sed -i 's/ethtool_eee/ethtool_keee/g' "$ETH_H"
            echo "源码手术完成。"
        fi

    - name: Final Build
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: SL3000-Firmware
        path: openwrt/bin/targets/mediatek/filogic/
