name: SL3000 构建验证
on:
  push:
    branches: [ openwrt-24.10-6.6 ]
    paths:
      - 'targets/mediatek/filogic/**'
      - 'package/boot/uboot-mediatek/**'
      - '.github/workflows/build-sl3000.yml'
      - 'scripts/sl3000-build.sh'
  pull_request:
    branches: [ openwrt-24.10-6.6 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TARGET: mediatek/filogic
      DEVICE: sl3000
    steps:
      - name: 拉取代码（openwrt-24.10-6.6分支）
        uses: actions/checkout@v4
        with:
          repository: ykm888/66
          ref: openwrt-24.10-6.6
          fetch-depth: 1

      - name: 安装依赖
        run: |
          sudo apt update && sudo apt install -y build-essential libncurses5-dev libssl-dev \
            python3-distutils unzip wget rsync device-tree-compiler

      - name: 初始化OpenWrt
        run: |
          ./scripts/feeds update -a && ./scripts/feeds install -a
          make defconfig ${{ env.TARGET }}_${{ env.DEVICE }}_config

      - name: 编译固件
        run: |
          chmod +x ./scripts/sl3000-build.sh && ./scripts/sl3000-build.sh

      - name: 验证产物
        run: |
          [ -f "bin/targets/${{ env.TARGET }}/openwrt-${{ env.TARGET }}-${{ env.DEVICE }}-firmware.bin" ] || {
            echo "产物缺失，构建失败"
            exit 1
          }
          sha256sum -c "bin/targets/${{ env.TARGET }}/sha256sums"

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: sl3000-firmware
          path: bin/targets/${{ env.TARGET }}/*.bin
