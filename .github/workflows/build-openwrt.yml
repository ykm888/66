name: 司洛SL-3000 1024M 救砖 (三分支全量修复版)

on:
  workflow_dispatch:

env:
  # 物理分支定义：严格遵循用户记忆中的仓库布局
  MY_REPO: ykm888/66
  FRAMEWORK_BRANCH: openwrt-24.10-6.6
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Main (获取脚本与 8000行配置)
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Initialization Environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/ant0ny-0/openwrt-scripts/master/depends-ubuntu-2204)
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Framework Branch (物理拉取 Shell 编译底座)
      run: |
        # 将 openwrt-24.10-6.6 分支克隆至 openwrt 子目录
        git clone --depth 1 https://github.com/${{ env.MY_REPO }}.git -b ${{ env.FRAMEWORK_BRANCH }} $GITHUB_WORKSPACE/openwrt

    - name: Update & Install Feeds
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Execute Physical Patch (三分支物理闭合执行)
      run: |
        # 核心修复：进入 openwrt 目录，通过绝对路径调用 main 分支的 scripts/sl3000-patch.sh
        cd $GITHUB_WORKSPACE/openwrt
        chmod +x $GITHUB_WORKSPACE/scripts/sl3000-patch.sh
        $GITHUB_WORKSPACE/scripts/sl3000-patch.sh

    - name: Download & Pre-compile
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        # 此时脚本已完成 U-Boot 源码重定向及 .config 物理覆盖
        make defconfig
        make download -j8

    - name: Compile Recovery Firmware
      id: compile
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        # 执行物理全量构建：包含 1024M U-Boot + 8000行插件固件
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize Recovery Bundle (物理搜集救砖全家桶)
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p $GITHUB_WORKSPACE/recovery_bundle
        cd $GITHUB_WORKSPACE/openwrt/bin/targets/mediatek/filogic
        # 搜集：GPT (分区表) + Preloader (1024M初始化) + FIP (Web界面) + Factory (整机包)
        cp *factory.img.gz $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-gpt.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-preloader.bin $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        cp *emmc-bl31-uboot.fip $GITHUB_WORKSPACE/recovery_bundle/ 2>/dev/null || true
        echo "FIRMWARE=$GITHUB_WORKSPACE/recovery_bundle" >> $GITHUB_ENV

    - name: Release Artifacts
      uses: softprops/action-gh-release@v2
      if: env.FIRMWARE != ''
      with:
        tag_name: SL3000_1024M_YKM888_${{ github.run_id }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          司洛 SL-3000 1024M 物理全闭环救砖包 (2026-03-02)
          - 仓库源: ykm888/66
          - U-Boot 源码分支: sl3000-uboot-base
          - 编译框架分支: openwrt-24.10-6.6
          - 内存适配: 1024M (DRAM_BANKS=1)
          - 救砖功能: 内置 Web FailSafe (192.168.1.1)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
