name: Clean sl3000.config (auto-fix)

on:
  workflow_dispatch:          # 允许手动触发
  push:
    paths:
      - 'custom-config/sl3000.config'   # 当文件被推送时自动触发

jobs:
  clean-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 允许向仓库推送更改

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify config file exists
        run: |
          if [ ! -f custom-config/sl3000.config ]; then
            echo "❌ File custom-config/sl3000.config not found!"
            exit 1
          fi
          echo "✅ Found custom-config/sl3000.config"

      - name: Clean up the config file
        run: |
          set -e  # 遇到错误立即退出
          CONFIG_FILE="custom-config/sl3000.config"
          TMP_FILE=$(mktemp)

          # 复制原始文件到临时文件
          cp "$CONFIG_FILE" "$TMP_FILE"

          # 1. 启用 mt7981 无线固件（如果未启用）
          sed -i 's/^# \(CONFIG_PACKAGE_mt7981-wo-firmware\) is not set/\1=y/' "$TMP_FILE"

          # 2. 关闭内核调试选项（如果已启用）
          sed -i 's/^\(CONFIG_KERNEL_DEBUG_INFO\)=y/# \1 is not set/' "$TMP_FILE"
          sed -i 's/^\(CONFIG_KERNEL_DEBUG_KERNEL\)=y/# \1 is not set/' "$TMP_FILE"
          sed -i 's/^\(CONFIG_KERNEL_DEBUG_INFO_REDUCED\)=y/# \1 is not set/' "$TMP_FILE"

          # 3. 将 MTK Wi-Fi 驱动改为内置（如果为模块）
          sed -i 's/^\(CONFIG_MTK_MT_WIFI\)=m/\1=y/' "$TMP_FILE"

          # 4. 禁用 warp 驱动（解决编译错误）
          sed -i 's/^CONFIG_PACKAGE_kmod-warp=y/# CONFIG_PACKAGE_kmod-warp is not set/' "$TMP_FILE"
          # 注释所有以 CONFIG_WARP_ 和 CONFIG_WED_ 开头的行
          sed -i '/^CONFIG_WARP_/ s/^/# /' "$TMP_FILE"
          sed -i '/^CONFIG_WED_/ s/^/# /' "$TMP_FILE"

          # 5. （可选）移除所有注释的配置行，减小文件体积（默认不开启）
          # 如果需要，取消下面一行的注释
          # sed -i '/^# CONFIG_/d' "$TMP_FILE"

          # 6. 比较临时文件与原文件是否有变化
          if cmp -s "$CONFIG_FILE" "$TMP_FILE"; then
            echo "✅ No changes needed, file is already clean."
            rm "$TMP_FILE"
            exit 0
          fi

          # 7. 将更新后的文件写回原位置
          cp "$TMP_FILE" "$CONFIG_FILE"
          echo "✅ Cleaned config saved to $CONFIG_FILE"
          rm "$TMP_FILE"

          # 显示修改差异（便于查看）
          echo "📋 Changes made:"
          git diff "$CONFIG_FILE" || true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add custom-config/sl3000.config

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(config): auto-fix sl3000.config (enable wireless, disable warp)"
            git push
            echo "✅ Changes pushed to repository."
          fi
