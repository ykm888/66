name: Clean sl3000.config (Final-Fix)

on:
  workflow_dispatch:

jobs:
  pixel-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 物理检出仓库
        uses: actions/checkout@v4

      - name: 2. 物理彻底阻断 Warp (内核 6.6 兼容性对齐)
        run: |
          set -e
          CONFIG_FILE="custom-config/sl3000.config"
          if [ -f "$CONFIG_FILE" ]; then
            echo ">>> 正在物理切除 Warp/WED 冲突..."
            # 删除所有旧的 warp/mtwifi-cfg 引用
            sed -i '/CONFIG_PACKAGE_kmod-mtk-warp/d' "$CONFIG_FILE"
            sed -i '/CONFIG_PACKAGE_mtwifi-cfg/d' "$CONFIG_FILE"
            sed -i '/CONFIG_MTK_WARP_SUPPORT/d' "$CONFIG_FILE"
            
            # 物理注入你确认的锁死逻辑
            echo "CONFIG_PACKAGE_kmod-mtk-warp=n" >> "$CONFIG_FILE"
            echo "# CONFIG_PACKAGE_kmod-mtk-warp is not set" >> "$CONFIG_FILE"
            echo "# CONFIG_PACKAGE_mtwifi-cfg is not set" >> "$CONFIG_FILE"
            echo "CONFIG_MTK_WARP_SUPPORT=n" >> "$CONFIG_FILE"
          fi

      - name: 3. 物理注入磁盘工具 (1024M 增强包)
        run: |
          set -e
          CONFIG_FILE="custom-config/sl3000.config"
          echo ">>> 正在补全物理磁盘操作工具..."
          DISK_PKGS=(
            "CONFIG_PACKAGE_kmod-fs-ext4=y"
            "CONFIG_PACKAGE_kmod-fs-vfat=y"
            "CONFIG_PACKAGE_kmod-fs-ntfs3=y"
            "CONFIG_PACKAGE_kmod-fs-exfat=y"
            "CONFIG_PACKAGE_fdisk=y"
            "CONFIG_PACKAGE_e2fsprogs=y"
            "CONFIG_PACKAGE_lsblk=y"
            "CONFIG_PACKAGE_block-mount=y"
          )
          for pkg in "${DISK_PKGS[@]}"; do
            grep -q "${pkg%%=*}" "$CONFIG_FILE" || echo "$pkg" >> "$CONFIG_FILE"
          done

      - name: 4. 物理回推修复后的仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "物理配置已对齐，无需重复推送。"
          else
            git commit -m "fix(sl3000): 彻底阻断 Warp 并注入物理磁盘工具"
            git push origin HEAD
          fi
