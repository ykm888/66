name: SL3000-Config-AutoFix-Only-v2.5

on:
  workflow_dispatch:

jobs:
  fix-and-push:
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # 物理授权反向推送权限

    steps:
      - name: 1. 物理环境准备 (工序一)
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential flex bison g++ gawk gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: 2. 物理克隆固件源码 (工序二)
        run: |
          # 物理锁定 sl3000-padavan-2410 分支，作为 defconfig 的运行环境
          git clone --depth 1 -b sl3000-padavan-2410 https://github.com/ykm888/66 openwrt

      - name: 3. 物理同步 Feeds (工序三)
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 4. 物理拉取并定点修复 (工序四)
        run: |
          cd openwrt
          # 物理拉取 8000 行原始配置
          curl -fLo .config https://raw.githubusercontent.com/ykm888/66/main/custom-config/sl3000.config
          
          # 【物理手术】：强制切断 rd05a1 递归依赖
          sed -i 's/CONFIG_PACKAGE_rd05a1=y/# CONFIG_PACKAGE_rd05a1 is not set/g' .config
          
          # 【物理手术】：清理 5.4 内核不兼容的冗余项
          sed -i 's/CONFIG_PACKAGE_kmod-xdp-sockets-diag=y/# kmod-xdp-sockets-diag removed/g' .config
          
          # 【物理执行】：由 OpenWrt 系统物理剔除 8000 行中的无效条目并重组
          # 这步会物理修复所有依赖冲突
          make defconfig

      - name: 5. 物理反向推送至 Main 分支 (工序五)
        run: |
          # 物理克隆仓库主分支
          git clone -b main https://github.com/ykm888/66 repo-main
          
          # 物理替换修复后的配置文件
          cp openwrt/.config repo-main/custom-config/sl3000.config
          
          cd repo-main
          git config --global user.email "bot@github.com"
          git config --global user.name "SL3000-Config-Bot"
          
          # 物理提交变更
          git add custom-config/sl3000.config
          git commit -m "chore: 物理修复 sl3000.config 递归依赖并完成 defconfig 瘦身 [v2.5]"
          
          # 物理推送 (Actions 环境下会自动使用 GITHUB_TOKEN)
          git push
