name: Clean sl3000.config (auto-fix)

on:
  workflow_dispatch:          # 手动触发
  push:
    paths:
      - 'custom-config/**'    # 当配置更新时自动修复

jobs:
  pixel-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 物理检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. 物理洗白：Makefile 幽灵依赖 (解决 1m 12s 报错)
        run: |
          set -e
          echo "正在从仓库源码中物理切除不存在的依赖..."
          
          # 定义那 8 个导致报错的包名
          GHOST_PKGS=("lua-cjson" "glib2" "libgpiod" "libpam" "pciids" "pciutils")

          for pkg in "${GHOST_PKGS[@]}"; do
            # 物理扫描仓库内的所有 Makefile 并删除依赖定义
            find . -name "Makefile" | xargs sed -i "s/+$pkg//g" 2>/dev/null || true
            find . -name "Makefile" | xargs sed -i "s/ $pkg//g" 2>/dev/null || true
          done
          echo "✅ 仓库 Makefile 物理清理完成。"

      - name: 3. 物理洗白：sl3000.config (锁定 1024M 状态)
        run: |
          set -e
          CONFIG_FILE="custom-config/sl3000.config"
          [ ! -f "$CONFIG_FILE" ] && exit 0
          
          # 锁死禁用项（修复 90% 处的 WARP 报错）
          sed -i 's/^CONFIG_PACKAGE_kmod-mtk-warp=y/# CONFIG_PACKAGE_kmod-mtk-warp is not set/' "$CONFIG_FILE"
          sed -i 's/^CONFIG_PACKAGE_mtwifi-cfg=y/# CONFIG_PACKAGE_mtwifi-cfg is not set/' "$CONFIG_FILE"
          sed -i '/^CONFIG_WARP_/ s/^CONFIG_/# CONFIG_/' "$CONFIG_FILE"
          sed -i '/^CONFIG_WED_/ s/^CONFIG_/# CONFIG_/' "$CONFIG_FILE"
          
          # 补全必需项
          if ! grep -q "CONFIG_PACKAGE_mt7981-wo-firmware=y" "$CONFIG_FILE"; then
            echo "CONFIG_PACKAGE_mt7981-wo-firmware=y" >> "$CONFIG_FILE"
          fi
          echo "✅ Config 物理锁定完成。"

      - name: 4. 物理回推修复后的仓库源
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --staged --quiet; then
            echo "物理状态一致，无需操作。"
          else
            git commit -m "fix(repo): 像素级修复 Makefile 依赖并锁定 Config"
            git push
            echo "✅ 修复已推送到仓库源，主构建任务现在可以安全运行。"
          fi
