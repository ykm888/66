name: Clean sl3000.config (auto-fix)

on:
  workflow_dispatch:          # 允许手动触发
  push:
    paths:
      - 'custom-config/sl3000.config'

jobs:
  clean-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 物理检出
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. 物理执行像素级洗白
        run: |
          set -e
          CONFIG_FILE="custom-config/sl3000.config"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ 配置文件不存在"
            exit 1
          fi
          
          TMP_FILE=$(mktemp)
          cp "$CONFIG_FILE" "$TMP_FILE"

          echo "正在物理抹除幽灵依赖..."
          # 修复 8 项物理缺失依赖
          sed -i '/lua-cjson/d' "$TMP_FILE"
          sed -i '/glib2/d' "$TMP_FILE"
          sed -i '/libgpiod/d' "$TMP_FILE"
          sed -i '/libpam/d' "$TMP_FILE"
          sed -i '/pciids/d' "$TMP_FILE"
          sed -i '/pciutils/d' "$TMP_FILE"
          sed -i '/luci-lua-runtime/d' "$TMP_FILE"
          sed -i '/luasrcdiet/d' "$TMP_FILE"

          echo "正在物理锁死 WARP 禁用状态..."
          sed -i 's/^CONFIG_PACKAGE_kmod-mtk-warp=y/# CONFIG_PACKAGE_kmod-mtk-warp is not set/' "$TMP_FILE"
          sed -i 's/^CONFIG_PACKAGE_mtwifi-cfg=y/# CONFIG_PACKAGE_mtwifi-cfg is not set/' "$TMP_FILE"
          sed -i '/^CONFIG_WARP_/ s/^CONFIG_/# CONFIG_/' "$TMP_FILE"
          sed -i '/^CONFIG_WED_/ s/^CONFIG_/# CONFIG_/' "$TMP_FILE"

          echo "正在物理补全无线固件..."
          if ! grep -q "CONFIG_PACKAGE_mt7981-wo-firmware=y" "$TMP_FILE"; then
            echo "CONFIG_PACKAGE_mt7981-wo-firmware=y" >> "$TMP_FILE"
          fi

          cp "$TMP_FILE" "$CONFIG_FILE"
          rm "$TMP_FILE"

      - name: 3. 物理推送到仓库源
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom-config/sl3000.config
          
          # 物理检查是否有变更
          if git diff --staged --quiet; then
            echo "物理状态一致，无需推送。"
          else
            git commit -m "fix(config): 修复 Syntax Error 并物理抹除依赖"
            git push
          fi
