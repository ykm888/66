name: Build OpenWrt for SL-3000

on:
  workflow_dispatch:        # 手动触发
  push:
    paths:
      - 'custom-config/sl3000.config'   # 配置文件更新时自动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read         # 只需读取权限
    steps:
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo docker image prune -a -f

      - name: Checkout repository (contains custom config)
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Checkout ImmortalWrt source
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: openwrt-24.10
          path: openwrt

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget subversion \
            swig time libpython3-dev python3 python3-setuptools

      - name: Copy custom config
        run: cp repo/custom-config/sl3000.config openwrt/.config

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply safety fixes (disable warp and ensure wireless firmware)
        run: |
          cd openwrt
          # 确保 mt7981 无线固件已启用
          sed -i 's/^# CONFIG_PACKAGE_mt7981-wo-firmware is not set/CONFIG_PACKAGE_mt7981-wo-firmware=y/' .config
          # 确保 warp 驱动已禁用
          sed -i 's/^CONFIG_PACKAGE_kmod-warp=y/# CONFIG_PACKAGE_kmod-warp is not set/' .config
          sed -i '/^CONFIG_WARP_/ s/^/# /' .config
          sed -i '/^CONFIG_WED_/ s/^/# /' .config

      - name: Apply default configuration
        run: |
          cd openwrt
          make defconfig

      - name: Show final .config (for debugging)
        run: |
          cd openwrt
          echo "===== .config ====="
          grep -v '^#' .config | grep -v '^$' || true

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s
        timeout-minutes: 360

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sl-3000-firmware
          path: |
            openwrt/bin/targets/mediatek/filogic/*-sysupgrade.bin
            openwrt/bin/targets/mediatek/filogic/*-ubootmod*.bin
            openwrt/bin/targets/mediatek/filogic/*.itb
            openwrt/bin/targets/mediatek/filogic/*.gz
            openwrt/bin/targets/mediatek/filogic/*.xz
            openwrt/bin/targets/mediatek/filogic/*.manifest
          if-no-files-found: warn
