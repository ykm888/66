name: U-Boot-仓库物理脱水手术-终极版

on:
  workflow_dispatch:

# 【核心修复 1】物理开启写入权限，否则 push 必报 403 错误
permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 物理签入仓库 (V4 绝对锁定)
        uses: actions/checkout@v4
        with:
          ref: sl3000-uboot-base
          # 【核心修复 2】物理全量拉取历史，防止 push 失败
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 执行物理粉碎手术 (像素级对齐)
        run: |
          # 物理信任目录，防止安全策略拦截
          git config --global --add safe.directory $GITHUB_WORKSPACE

          # 1. 清理 configs：物理粉碎无关定义
          if [ -d "configs" ]; then
              cd configs
              find . -type f ! -name "*mt7981*" ! -name "sandbox*" -delete
              cd ..
          fi

          # 2. 清理 DTS：保留架构骨架，确保 Makefile 不断裂
          if [ -d "arch/arm/dts" ]; then
              cd arch/arm/dts
              find . -type f ! -name "*mt7981*" ! -name "Makefile" ! -name "Kconfig" ! -name "*.dtsi" -delete
              cd ../../../
          fi

          # 3. 清理 include/configs：物理保护引导头文件
          if [ -d "include/configs" ]; then
              cd include/configs
              # 物理保留 mediatek 相关头文件，这是编译 MT7981 的命根子
              find . -type f ! -name "mt7981.h" ! -name "mediatek.h" ! -name "mtk-common.h" -delete
              cd ../../
          fi

      - name: 提交物理变更 (带逻辑保护)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .
          
          # 物理检查变动，防止空提交报错
          if git diff --staged --quiet; then
              echo "没有物理变动需要提交，仓库已经是脱水状态。"
          else
              git commit -m "物理瘦身：彻底移除无关架构，仅保留 MT7981 核心组件"
              # 物理强制推送，确保同步
              git push origin sl3000-uboot-base
          fi
