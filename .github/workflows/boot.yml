name: U-Boot-物理同步并自动创建分支

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: 物理签入跳板
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 物理环境初始化
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: 物理拉取并注入魔改配置
        run: |
          # 1. 物理拉取官方 MTK 源码全集
          git clone --depth 1 -b mtksoc https://github.com/mtk-openwrt/u-boot.git u-boot-repo
          cd u-boot-repo
          
          # 2. 物理注入 SL-3000 1024M 配置文件
          if [ -f "configs/mt7981_emmc_rfb_defconfig" ]; then
              cp configs/mt7981_emmc_rfb_defconfig configs/mt7981_emmc_defconfig
              sed -i 's/CONFIG_NR_DRAM_BANKS=.*/CONFIG_NR_DRAM_BANKS=1/g' configs/mt7981_emmc_defconfig
          fi

          # 3. 执行物理脱水手术（精准保留编译环境）
          echo "开始精准物理保留手术..."
          
          # 【核心修复】：根目录必须保留 Kconfig，否则 make 报错
          find . -maxdepth 1 -type f ! -name "Makefile" ! -name "Kconfig" ! -name ".gitignore" ! -name "README" -delete
          
          # 【核心修复】：保留 scripts 目录（编译核心脚本）
          # 除了以下目录，其他二级目录全部物理删除
          find . -maxdepth 1 -type d ! -name "." ! -name "configs" ! -name "arch" ! -name "include" ! -name "scripts" ! -name ".git" -exec rm -rf {} +

          # 保留 mt7981 相关配置
          find configs/ -type f ! -name "*mt7981*" ! -name "sandbox*" -delete
          
          # 保留 mt7981 相关设备树及 Kconfig
          find arch/arm/dts/ -type f ! -name "*mt7981*" ! -name "Makefile" ! -name "Kconfig" ! -name "*.dtsi" -delete
          
          # 【核心修复】：保留架构根 Kconfig
          find arch/arm/ -maxdepth 1 -type f ! -name "Kconfig" ! -name "Makefile" -delete
          
          # 保留 mt7981 相关头文件
          find include/configs/ -type f ! -name "mt7981.h" ! -name "mediatek.h" ! -name "mtk-common.h" -delete

      - name: 物理创建并推送分支
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd u-boot-repo
          git remote remove origin
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          
          git checkout -b sl3000-uboot-base
          git add .
          git commit -m "Initialize: SL-3000 1024M U-Boot (物理补全编译环境版)"
          git push -f origin sl3000-uboot-base
