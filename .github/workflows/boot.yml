name: U-Boot-物理同步并自动创建分支

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: 物理签入跳板
        uses: actions/checkout@v4
        with:
          ref: main  # 物理锁定现有的 main 分支作为启动跳板

      - name: 物理环境初始化
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: 物理拉取并注入魔改配置
        run: |
          # 1. 物理拉取官方 MTK 源码全集
          git clone -b mtksoc https://github.com/mtk-openwrt/u-boot.git u-boot-repo
          cd u-boot-repo
          
          # 2. 物理注入 SL-3000 1024M 配置文件
          # 像素级复制：基于 eMMC 官方定义创建
          if [ -f "configs/mt7981_emmc_rfb_defconfig" ]; then
              cp configs/mt7981_emmc_rfb_defconfig configs/mt7981_sl_3000-emmc_defconfig
              # 物理劫持：确保 DRAM 银行定义正确 (1024M 核心逻辑)
              sed -i 's/CONFIG_NR_DRAM_BANKS=.*/CONFIG_NR_DRAM_BANKS=1/g' configs/mt7981_sl_3000-emmc_defconfig
          fi

          # 3. 执行物理脱水手术 (粉碎无关架构)
          echo "开始物理粉碎手术..."
          find configs/ -type f ! -name "*mt7981*" ! -name "sandbox*" -delete
          find arch/arm/dts/ -type f ! -name "*mt7981*" ! -name "Makefile" ! -name "Kconfig" ! -name "*.dtsi" -delete
          find include/configs/ -type f ! -name "mt7981.h" ! -name "mediatek.h" ! -name "mtk-common.h" -delete

      - name: 物理创建并推送分支
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd u-boot-repo
          
          # 物理重定义远程目标为当前仓库
          git remote remove origin
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          
          # 物理创建新分支 sl3000-uboot-base
          git checkout -b sl3000-uboot-base
          git add .
          git commit -m "Initialize: SL-3000 1024M U-Boot (脱水完成版)"
          
          # 物理强制推送：即使远程没有这个分支，也会自动创建
          git push -f origin sl3000-uboot-base
