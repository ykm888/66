name: U-Boot-物理同步并自动创建分支

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: 物理签入跳板
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 物理环境初始化
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: 物理拉取并注入魔改配置
        run: |
          # 1. 物理拉取官方 MTK 源码全集 (深度为1)
          git clone --depth 1 -b mtksoc https://github.com/mtk-openwrt/u-boot.git u-boot-repo
          cd u-boot-repo
          
          # 2. 物理注入 SL-3000 1024M 配置文件
          # 我们不再大规模删除，而是精准修改编译所需的配置文件
          if [ -f "configs/mt7981_emmc_rfb_defconfig" ]; then
              cp configs/mt7981_emmc_rfb_defconfig configs/mt7981_emmc_defconfig
              # 关键修复：强制设置内存 Bank 为 1 适配 1024M 内存
              sed -i 's/CONFIG_NR_DRAM_BANKS=.*/CONFIG_NR_DRAM_BANKS=1/g' configs/mt7981_emmc_defconfig
              echo "CONFIG_NR_DRAM_BANKS=1" >> configs/mt7981_emmc_defconfig
          fi

          # 3. 彻底解决：不再执行“粉碎手术”
          # 仅仅移除 .git 目录以减小推送体积，保留所有源码结构以维持 Kconfig 引用链
          rm -rf .git
          echo ">>> 源码物理结构已完整保留，确保 Kconfig 链条不断裂。"

      - name: 物理创建并推送分支
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd u-boot-repo
          # 初始化一个新的 git 仓库用于推送分支
          git init
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          
          git checkout -b sl3000-uboot-base
          git add .
          git commit -m "Initialize: SL-3000 1024M U-Boot (源头根治版：保留完整目录树)"
          git push -f origin sl3000-uboot-base
